name: Bootstrap validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use pinned Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Use pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy
          rustup default 1.97.1
      - name: Install npm dependencies reproducibly
        run: npm ci
      - name: Check frontend formatting
        run: npm run format:check
      - name: Lint frontend
        run: npm run lint
      - name: Type-check frontend
        run: npm run typecheck
      - name: Test frontend
        run: npm test
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Lint Rust targets
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings
      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
